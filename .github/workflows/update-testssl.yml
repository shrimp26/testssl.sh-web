name: Update testssl.sh version

on:
  schedule:
    # Run every day at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Use a PAT if you want the push to trigger the docker.yml workflow
          # (pushes from GITHUB_TOKEN don't trigger other workflows by default)
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Read current version
        id: current
        run: echo "version=$(cat TESTSSL_VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Fetch latest testssl.sh release
        id: latest
        run: |
          TAG=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/drwetter/testssl.sh/releases/latest \
            | jq -r '.tag_name')
          # Strip leading 'v'
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if update needed
        id: diff
        run: |
          if [ "${{ steps.current.outputs.version }}" = "${{ steps.latest.outputs.version }}" ]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
            echo "No update needed (current=${{ steps.current.outputs.version }})"
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
            echo "Update available: ${{ steps.current.outputs.version }} → ${{ steps.latest.outputs.version }}"
          fi

      - name: Update TESTSSL_VERSION and commit
        if: steps.diff.outputs.up_to_date == 'false'
        run: |
          echo "${{ steps.latest.outputs.version }}" > TESTSSL_VERSION
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add TESTSSL_VERSION
          git commit -m "chore: update testssl.sh to ${{ steps.latest.outputs.tag }}"
          git push

      - name: Summary
        run: |
          if [ "${{ steps.diff.outputs.up_to_date }}" = "true" ]; then
            echo "### Already up to date: v${{ steps.current.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Updated: v${{ steps.current.outputs.version }} → v${{ steps.latest.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
            echo "A new Docker build will be triggered automatically." >> "$GITHUB_STEP_SUMMARY"
          fi
